appId: com.langadventure.fishbowl
productName: Fishbowl
copyright: Copyright © 2024 Language Adventure LLC

# Directories
directories:
  output: dist/packages
  buildResources: build

# Files to include in the app
files:
  - dist/main/**/*
  - dist/preload/**/*
  - dist/renderer/**/*
  - package.json
  - '!**/*.ts'
  - '!**/*.map'
  - '!**/.DS_Store'
  - '!src/**/*'
  - '!tsconfig*.json'
  - '!vite.config.ts'
  - '!electron-builder.yml'

# Extra files to include
extraFiles:
  - from: assets
    to: resources
    filter: '**/*'

# Compression level
compression: normal

# macOS configuration
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.plist
  entitlementsInherit: build/entitlements.plist

# DMG configuration
dmg:
  title: Fishbowl ${version}
  icon: assets/icon.icns
  background: build/dmg-background.png
  iconSize: 80
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
  window:
    width: 540
    height: 380

# Windows configuration
win:
  target:
    - target: nsis
      arch: [x64, ia32]
  icon: assets/icon.ico
  publisherName: Language Adventure LLC
  verifyUpdateCodeSignature: false

# NSIS configuration
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  license: LICENSE
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Fishbowl

# Linux configuration
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
  category: Office
  icon: assets/icon.png
  synopsis: Multi-Agent AI Conversations
  description: >
    Fishbowl is an Electron-based desktop application for multi-agent AI conversations,
    enabling natural collaboration between multiple AI personalities in a shared conversation space.

# AppImage configuration
appImage:
  license: LICENSE

# Debian package configuration
deb:
  priority: optional
  depends: ['glibc']

# RPM package configuration
rpm:
  license: MIT
  vendor: Language Adventure LLC

# Snap configuration
snap:
  title: Fishbowl
  summary: Multi-Agent AI Conversations
  description: >
    Fishbowl is an Electron-based desktop application for multi-agent AI conversations,
    enabling natural collaboration between multiple AI personalities in a shared conversation space.
  grade: stable
  confinement: strict

# Auto-updater configuration
publish:
  provider: github
  owner: langadventurellc
  repo: fishbowl
  private: false

# Build configuration
buildVersion: ${env.BUILD_NUMBER}
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

# Electron version
electronVersion: 37.2.0

# Node.js version
nodeVersion: 18.20.4

# Fuses for security
electronFuses:
  runAsNode: false
  enableCookieEncryption: true
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true
  loadBrowserProcessSpecificV8Snapshot: false
  grantFileProtocolExtraPrivileges: false
