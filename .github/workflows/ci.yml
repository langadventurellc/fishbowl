name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Skip CI until we have actual code to test
  check-for-code:
    runs-on: ubuntu-latest
    outputs:
      has-code: ${{ steps.check.outputs.has-code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check if src directory exists
        id: check
        run: |
          if [ -d "src" ]; then
            echo "has-code=true" >> $GITHUB_OUTPUT
          else
            echo "has-code=false" >> $GITHUB_OUTPUT
          fi

  # Lint and Type Check
  lint-and-typecheck:
    runs-on: ubuntu-latest
    needs: check-for-code
    if: needs.check-for-code.outputs.has-code == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run type-check

  # Unit Tests
  test:
    runs-on: ubuntu-latest
    needs: check-for-code
    if: needs.check-for-code.outputs.has-code == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild SQLite
        run: npm rebuild better-sqlite3

      - name: Run tests
        run: npm test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  # Build Application
  build:
    runs-on: ${{ matrix.os }}
    needs: check-for-code
    if: needs.check-for-code.outputs.has-code == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild SQLite
        run: npm rebuild better-sqlite3

      - name: Build application
        run: npm run build

      - name: Package application
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-${{ matrix.os }}
          path: dist/

  # Security Audit
  security-audit:
    runs-on: ubuntu-latest
    needs: check-for-code
    if: needs.check-for-code.outputs.has-code == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=moderate

      - name: Run dependency check
        run: npx audit-ci --moderate

  # Performance Tests (placeholder)
  performance:
    runs-on: ubuntu-latest
    needs: check-for-code
    if: needs.check-for-code.outputs.has-code == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run performance tests
        run: echo "Performance tests will be implemented in Phase 6"

  # Integration Tests (placeholder)
  integration-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, build]
    if: needs.check-for-code.outputs.has-code == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: echo "Integration tests will be implemented in Phase 8"

  # Deployment (only on main branch)
  deploy:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, build, security-audit]
    if: github.ref == 'refs/heads/main' && needs.check-for-code.outputs.has-code == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to staging
        run: echo "Deployment will be configured in Phase 8"

  # Placeholder job for when there's no code yet
  no-code-placeholder:
    runs-on: ubuntu-latest
    needs: check-for-code
    if: needs.check-for-code.outputs.has-code == 'false'
    steps:
      - name: No code to test
        run: |
          echo "::notice::No src directory found - skipping CI/CD pipeline"
          echo "CI/CD pipeline is configured and ready for when code is added"